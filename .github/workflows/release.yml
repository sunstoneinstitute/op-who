name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          APP_DIR=".build/op-who.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          cp .build/release/op-who "$APP_DIR/Contents/MacOS/"
          cp Sources/Info.plist "$APP_DIR/Contents/"

          # Stamp version from tag into Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$APP_DIR/Contents/Info.plist"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign with hardened runtime
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          codesign --deep --force --options runtime \
            --entitlements release.entitlements \
            --sign "$IDENTITY" \
            .build/op-who.app

          codesign --verify --deep --verbose=2 .build/op-who.app

      - name: Package
        run: ditto -c -k --keepParent .build/op-who.app .build/op-who.zip

      - name: Notarize
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool submit .build/op-who.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait

          xcrun stapler staple .build/op-who.app

          # Re-zip with stapled ticket
          rm .build/op-who.zip
          ditto -c -k --keepParent .build/op-who.app .build/op-who.zip

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 .build/op-who.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" .build/op-who.zip \
            --title "op-who ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sunstoneinstitute/homebrew-tap.git" "$RUNNER_TEMP/tap"
          cd "$RUNNER_TEMP/tap"

          mkdir -p Casks
          cat > Casks/op-who.rb << CASK
          cask "op-who" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/sunstoneinstitute/op-who/releases/download/v#{version}/op-who.zip"
            name "op-who"
            desc "Shows which process triggered a 1Password approval dialog"
            homepage "https://github.com/sunstoneinstitute/op-who"

            app "op-who.app"

            zap trash: [
              "~/Library/Preferences/ai.sunstoneinstitute.op-who.plist",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/op-who.rb
          git commit -m "Update op-who to ${VERSION}"
          git push
